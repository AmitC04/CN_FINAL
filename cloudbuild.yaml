steps:
  - name: "gcr.io/cloud-builders/docker"
    args: ["build", "-t", "gcr.io/$PROJECT_ID/youtube-pipeline", "."]
  - name: "gcr.io/cloud-builders/docker"
    args: ["push", "gcr.io/$PROJECT_ID/youtube-pipeline"]
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    entrypoint: gcloud
    args:
      - "run"
      - "deploy"
      - "youtube-pipeline"
      - "--image"
      - "gcr.io/$PROJECT_ID/youtube-pipeline"
      - "--region"
      - "asia-south1"
      - "--platform"
      - "managed"
      - "--allow-unauthenticated"
      - "--port"
      - "8080"
      - "--set-env-vars"
      - "MONGO_URI=${_MONGO_URI},MONGO_DB_NAME=${_MONGO_DB_NAME},YOUTUBE_API_KEY=${_YOUTUBE_API_KEY},GOOGLE_API_KEY=${_GOOGLE_API_KEY},API_KEY=${_API_KEY},WEBHOOK_SECRET=${_WEBHOOK_SECRET}"
images:
  - "gcr.io/$PROJECT_ID/youtube-pipeline"
